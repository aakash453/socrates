version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/multiverse/socrates/gen/go
    - file_option: csharp_namespace
      value: Multiverse.Socrates.V1
plugins:
  - remote: buf.build/protocolbuffers/cpp:v27.2
    out: generated/cpp
  - remote: buf.build/protocolbuffers/go:v1.34.2
    out: generated/go
    opt:
      - paths=source_relative
  - remote: buf.build/protocolbuffers/python:v27.2
    out: generated/python
  - remote: buf.build/grpc/cpp:v1.65.5
    out: generated/cpp
  - remote: buf.build/grpc/go:v1.5.1
    out: generated/go
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/python:v1.65.5
    out: generated/python
